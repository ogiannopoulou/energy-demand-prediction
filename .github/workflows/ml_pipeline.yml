name: ML Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.12'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .
      
      - name: Lint with ruff
        run: ruff check src/ api/ tests/
      
      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml

  train:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      
      - name: Train models
        env:
          ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}
        run: |
          python -c "
          import os
          from src.data.terna_loader import EntsoeClient
          from src.data.feature_engineering import build_feature_matrix, prepare_train_test, get_feature_columns
          from src.models.ml_models import train_xgboost_forecast, train_lightgbm_forecast
          from src.monitoring.mlops import setup_mlflow, log_experiment
          import skops.io as sio
          from datetime import datetime
          import json
          from pathlib import Path
          
          # Download data
          client = EntsoeClient()
          demand = client.get_actual_load('202301010000', '202401010000')
          
          # Build features
          df_features = build_feature_matrix(demand, target_col='demand_mw')
          df_features = df_features.dropna()
          
          # Split
          train, test = prepare_train_test(df_features, test_ratio=0.2)
          feature_cols = get_feature_columns(df_features, target_col='demand_mw')
          X_train, y_train = train[feature_cols], train['demand_mw']
          X_test, y_test = test[feature_cols], test['demand_mw']
          
          # Setup MLflow
          setup_mlflow()
          
          # Train XGBoost
          xgb_model, xgb_pred, xgb_metrics = train_xgboost_forecast(X_train, y_train, X_test, y_test)
          log_experiment('XGBoost_Demand_Forecast', xgb_model, xgb_metrics, 
                        params={'n_estimators': 500, 'max_depth': 6},
                        tags={'data_range': '2023-2024', 'features': len(feature_cols)})
          
          # Train LightGBM
          lgb_model, lgb_pred, lgb_metrics = train_lightgbm_forecast(X_train, y_train, X_test, y_test)
          log_experiment('LightGBM_Demand_Forecast', lgb_model, lgb_metrics,
                        params={'n_estimators': 500, 'max_depth': 6},
                        tags={'data_range': '2023-2024', 'features': len(feature_cols)})
          
          # Save models
          models_dir = Path('models')
          models_dir.mkdir(exist_ok=True)
          
          for name, model, metrics in [('xgboost', xgb_model, xgb_metrics), 
                                        ('lightgbm', lgb_model, lgb_metrics)]:
              # Save model
              sio.dump(model, models_dir / f'{name}_demand_forecast.skops')
              
              # Save metadata
              meta = {
                  'name': f'{name}_demand_forecast',
                  'version': datetime.now().strftime('%Y%m%d%H%M%S'),
                  'trained_at': datetime.now().isoformat(),
                  'metrics': metrics,
                  'features': feature_cols,
                  'params': {'n_estimators': 500, 'max_depth': 6},
              }
              with open(models_dir / f'{name}_demand_forecast.json', 'w') as f:
                  json.dump(meta, f, indent=2)
          
          print('Training complete!')
          "
      
      - name: Save models
        uses: actions/upload-artifact@v4
        with:
          name: models
          path: models/

  build:
    runs-on: ubuntu-latest
    needs: train
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Download models
        uses: actions/download-artifact@v4
        with:
          name: models
          path: models/
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
